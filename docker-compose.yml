version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: tile_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tile123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tile_ai}
      MYSQL_USER: ${MYSQL_USER:-tile}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tile123456}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-tile123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tile_network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: tile_etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - TZ=Asia/Shanghai
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tile_network

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: tile_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tile_network

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: tile_milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      COMMON_SECURITY_AUTHORIZATIONENABLED: "false"
      TZ: Asia/Shanghai
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - tile_network
    command:
      - milvus
      - run
      - standalone

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tile_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      ENV: ${ENV:-prod}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-tile}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tile123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tile_ai}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION: tile_image_vector
      MINERU_API_URL: ${MINERU_API_URL:-http://mineru:8888}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3-8b}
      OPENCLIP_MODEL: ${OPENCLIP_MODEL:-ViT-B-32}
      OPENCLIP_PRETRAINED: ${OPENCLIP_PRETRAINED:-laion2b_s34b_b79k}
      CRAWLER_HEADLESS: ${CRAWLER_HEADLESS:-true}
      CRAWLER_DELAY_MIN: ${CRAWLER_DELAY_MIN:-1}
      CRAWLER_DELAY_MAX: ${CRAWLER_DELAY_MAX:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./images:/app/images
      - ./pdf:/app/pdf
      - ./data:/app/data
      - ./parser/output:/app/parser/output
    networks:
      - tile_network

volumes:
  mysql_data:
    driver: local
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local

networks:
  tile_network:
    driver: bridge